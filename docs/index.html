<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10191b">
  <meta name="description" content="企画・脚本のためのランダムな発想の種を生成します。">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="発想の種">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <title>発想の種</title>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p id="app-eyebrow" class="eyebrow">IDEA SEED</p>
        <h1 id="app-title">発想の種</h1>
      </div>
      <button id="menu-button" class="header-menu-button" type="button" hidden><span aria-hidden="true">←</span> メニュー</button>
    </header>

    <div id="mode-context" class="mode-context" hidden>
      <span class="mode-context-icon" aria-hidden="true">
        <svg data-mode-icon="scene" viewBox="0 0 48 48" fill="none">
          <path d="M10 18.5h28v20H10z"/>
          <path d="M8.5 10h27.8l3.2 8.5H11.7z"/>
          <path d="m15 10 3.2 8.5M24 10l3.2 8.5M33 10l3.2 8.5M10 25h28"/>
        </svg>
        <svg data-mode-icon="logline" viewBox="0 0 48 48" fill="none">
          <path d="M12 8h18l6 6v26H12z"/>
          <path d="M30 8v7h6M18 23h12M18 29h12M18 35h8"/>
          <path d="m39 20 1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/>
        </svg>
      </span>
      <p id="mode-description"></p>
    </div>

    <nav class="tab-bar" aria-label="画面切り替え" hidden>
      <button class="tab-button is-active" type="button" data-view="generator" aria-selected="true">生成</button>
      <button class="tab-button" type="button" data-view="history" aria-selected="false">
        履歴 <span id="history-count" class="tab-count">0件</span>
      </button>
    </nav>

    <main>
      <section id="menu-view" class="view-panel is-active" aria-labelledby="menu-title">
        <div class="menu-heading">
          <h2 id="menu-title">どこから考える？</h2>
          <p>考えたいものに合わせて、発想の入口を選ぶ。</p>
        </div>
        <div class="generator-menu">
          <button class="generator-menu-card" type="button" data-generator-id="scene">
            <span class="menu-card-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" fill="none">
                <path d="M10 18.5h28v20H10z"/>
                <path d="M8.5 10h27.8l3.2 8.5H11.7z"/>
                <path d="m15 10 3.2 8.5M24 10l3.2 8.5M33 10l3.2 8.5M10 25h28"/>
              </svg>
            </span>
            <span class="menu-card-body">
              <strong>シーン生成</strong>
              <small>いつ、どこで、誰が、何をした</small>
            </span>
            <span class="menu-card-arrow" aria-hidden="true"><i>→</i></span>
          </button>
          <button class="generator-menu-card" type="button" data-generator-id="logline">
            <span class="menu-card-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" fill="none">
                <path d="M12 8h18l6 6v26H12z"/>
                <path d="M30 8v7h6M18 23h12M18 29h12M18 35h8"/>
                <path d="m39 20 1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/>
              </svg>
            </span>
            <span class="menu-card-body">
              <strong>ログライン生成</strong>
              <small>物語の核になる6つの材料</small>
            </span>
            <span class="menu-card-arrow" aria-hidden="true"><i>→</i></span>
          </button>
        </div>
      </section>

      <section id="generator-view" class="view-panel" aria-labelledby="generator-title" hidden>
        <h2 id="generator-title" class="visually-hidden">生成結果</h2>
        <div id="result-list" class="result-list" aria-live="polite">
          <div class="empty-state">
            <span class="seed-mark" aria-hidden="true">✦</span>
            <p>ボタンを押すと、独立したランダム抽選を行います。</p>
          </div>
        </div>
        <p id="generator-message" class="message" role="status"></p>
      </section>

      <section id="history-view" class="view-panel" aria-label="履歴" hidden>
        <div class="history-tools" aria-label="履歴操作">
          <label class="search-field">
            <span class="visually-hidden">履歴検索</span>
            <input id="history-search" type="search" placeholder="履歴を検索" autocomplete="off">
          </label>
          <select id="history-sort" class="history-sort" aria-label="履歴の並び順">
            <option value="newest">新しい順</option>
            <option value="oldest">古い順</option>
          </select>
          <button id="clear-history-button" class="ghost-button danger-button" type="button" disabled>全削除</button>
        </div>
        <div id="history-list" class="history-list">
          <div class="empty-state compact"><p>生成履歴はまだありません。</p></div>
        </div>
      </section>
    </main>

    <footer class="action-footer" hidden>
      <button id="generate-button" class="generate-button" type="button" disabled>
        <span class="generate-label">生成</span>
        <span class="generate-symbol" aria-hidden="true">✦</span>
      </button>
    </footer>
  </div>

  <dialog id="confirm-dialog" class="confirm-dialog" aria-labelledby="confirm-dialog-title" aria-describedby="confirm-dialog-message">
    <div class="confirm-dialog-content">
      <h2 id="confirm-dialog-title">削除しますか？</h2>
      <p id="confirm-dialog-message"></p>
      <div class="confirm-dialog-actions">
        <button id="confirm-cancel-button" class="modal-button" type="button">キャンセル</button>
        <button id="confirm-delete-button" class="modal-button modal-delete-button" type="button">削除</button>
      </div>
    </div>
  </dialog>

  <noscript>このアプリを利用するにはJavaScriptを有効にしてください。</noscript>
  <script type="module" src="app.js"></script>
</body>
</html>
