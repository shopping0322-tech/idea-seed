<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10191b">
  <meta name="description" content="企画・脚本のためのランダムな発想の種を生成します。">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="発想の種">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <title>発想の種</title>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">IDEA SEED</p>
        <h1>発想の種</h1>
      </div>
    </header>

    <nav class="tab-bar" aria-label="画面切り替え">
      <button class="tab-button is-active" type="button" data-view="generator" aria-selected="true">生成</button>
      <button class="tab-button" type="button" data-view="history" aria-selected="false">履歴</button>
    </nav>

    <main>
      <section id="generator-view" class="view-panel is-active" aria-labelledby="generator-title">
        <h2 id="generator-title" class="visually-hidden">生成結果</h2>
        <div id="result-list" class="result-list" aria-live="polite">
          <div class="empty-state">
            <span class="seed-mark" aria-hidden="true">✦</span>
            <p>ボタンを押すと、独立したランダム抽選を行います。</p>
          </div>
        </div>
        <p id="generator-message" class="message" role="status"></p>
      </section>

      <section id="history-view" class="view-panel" aria-labelledby="history-title" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">OLDEST FIRST</p>
            <h2 id="history-title">履歴</h2>
          </div>
          <span id="history-count" class="count-badge">0件</span>
        </div>
        <div class="history-tools" aria-label="履歴操作">
          <label class="search-field">
            <span class="visually-hidden">履歴検索</span>
            <input id="history-search" type="search" placeholder="履歴を検索" autocomplete="off">
          </label>
          <select id="history-sort" class="history-sort" aria-label="履歴の並び順">
            <option value="newest">新しい順</option>
            <option value="oldest">古い順</option>
          </select>
          <button id="clear-history-button" class="ghost-button danger-button" type="button" disabled>全削除</button>
        </div>
        <div id="history-list" class="history-list">
          <div class="empty-state compact"><p>生成履歴はまだありません。</p></div>
        </div>
      </section>
    </main>

    <footer class="action-footer">
      <button id="generate-button" class="generate-button" type="button" disabled>
        <span class="generate-label">生成</span>
        <span class="generate-symbol" aria-hidden="true">✦</span>
      </button>
    </footer>
  </div>

  <dialog id="confirm-dialog" class="confirm-dialog" aria-labelledby="confirm-dialog-title" aria-describedby="confirm-dialog-message">
    <div class="confirm-dialog-content">
      <h2 id="confirm-dialog-title">削除しますか？</h2>
      <p id="confirm-dialog-message"></p>
      <div class="confirm-dialog-actions">
        <button id="confirm-cancel-button" class="modal-button" type="button">キャンセル</button>
        <button id="confirm-delete-button" class="modal-button modal-delete-button" type="button">削除</button>
      </div>
    </div>
  </dialog>

  <noscript>このアプリを利用するにはJavaScriptを有効にしてください。</noscript>
  <script type="module" src="app.js"></script>
</body>
</html>
